<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大明王朝 - MingDynasty</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- 顶部状态栏 -->
        <div id="status-bar" class="status-bar">
            <div class="status-date" id="status-date"></div>
            <div class="status-actions">
                <button id="next-day-btn" class="btn secondary-btn">次日</button>
            </div>
            <div class="status-stats">
                <span class="stat-item">金钱: <span id="money">0</span></span>
                <span class="stat-item">功勋: <span id="merit">0</span></span>
            </div>
        </div>

        <!-- 中间主显示区 -->
        <div id="main-display" class="main-display">
            <div id="character-view" class="character-view">
                <!-- 角色属性视图将在这里动态渲染 -->
            </div>
            <div id="city-view" class="scene-view" style="display: none;">
                <!-- 城市视图 -->
            </div>
            <div id="task-list-view" class="scene-view" style="display: none;">
                <!-- 任务列表视图 -->
            </div>
            <div id="farming-game-view" class="scene-view" style="display: none;">
                <!-- 小游戏共享容器 -->
            </div>
            <div id="card-collection-view" class="scene-view" style="display: none;">
                <!-- 卡片图鉴视图 -->
            </div>
            <div id="map-view" class="map-view" style="display: none;">
                <!-- 城市地图视图 -->
            </div>
        </div>

        <!-- 底部导航区 -->
        <div id="navigation-bar" class="navigation-bar">
            <button id="nav-character" class="nav-btn active">角色</button>
            <button id="nav-city" class="nav-btn">城市</button>
            <button id="nav-map" class="nav-btn">地图</button>
            <button id="nav-task" class="nav-btn">任务</button>
            <button id="nav-card" class="nav-btn">卡片</button>
        </div>

        <!-- 日志区域 -->
        <div id="interaction-area" class="interaction-area">
            <div id="log-area" class="log-area"></div>
        </div>
    </div>

    <!-- 数据文件 - 全部先加载 -->
    <script src="data/characters.js"></script>
    <script src="data/cities.js"></script>
    <script src="data/forces.js"></script>
    <script src="data/roles.js"></script>
    <script src="data/skills.js"></script>
    <script src="data/cards.js"></script>
    <script src="data/battle-cards.js"></script>
    <script src="data/tasks.js"></script>
    <script src="data/personal-battle.js"></script>

    <!-- 游戏模块 -->
    <script src="js/GameState.js"></script>
    <script src="js/GameView.js"></script>

    <!-- 主游戏入口 -->
    <script src="main.js"></script>
</body>
</html>
