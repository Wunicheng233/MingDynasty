<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大明王朝 - MingDynasty</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Pixelify+Sans:wght@400;700&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
    <!-- 新UI设计令牌和基础组件 -->
    <link rel="stylesheet" href="css/tokens.css">
    <link rel="stylesheet" href="css/components.css">
    <!-- 原有样式（保持兼容，迁移完成后清理） -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/views.css">
    <link rel="stylesheet" href="css/games.css">
    <link rel="stylesheet" href="css/battle.css">
</head>
<body>
    <!-- 启动界面 - 新增UI重构 -->
    <div id="start-screen" class="start-screen" style="display: none;"></div>
    <!-- 存档读档界面 - 新增UI重构 -->
    <div id="saveload-overlay" class="modal-overlay" style="display: none;">
        <div id="saveload-modal" class="modal"></div>
    </div>
    <!-- 设置界面 - 新增UI重构 -->
    <div id="settings-overlay" class="modal-overlay" style="display: none;">
        <div id="settings-modal" class="modal"></div>
    </div>
    <!-- 主游戏容器 - 全屏显示 -->
    <div id="game-container">
        <!-- 中间主显示区 - 占满全屏 -->
        <div id="main-display" class="main-display">
            <!-- 小游戏共享容器保留，其他界面全部动态创建 -->
            <div id="farming-game-view" class="scene-view" style="display: none;"></div>
        </div>
    </div>

    <!-- 主游戏入口 - ES6 Module -->
    <script type="module" src="main.js"></script>
</body>
</html>
