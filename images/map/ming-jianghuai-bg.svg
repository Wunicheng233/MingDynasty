<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- 复古纸张背景 -->
  <rect width="800" height="600" fill="#f5ecd8"/>

  <!-- 纸张纹理效果（噪点） -->
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
    <feColorMatrix in="noise" type="saturate" values="0" result="noiseGray"/>
    <feComposite in="noiseGray" in2="SourceGraphic" operator="arithmetic" k1="0" k2="0.03" k3="0" k4="0" result="texture"/>
  </filter>
  <rect width="800" height="600" filter="url(#noise)" fill="none"/>

  <!-- 长江水系 -->
  <path d="M 0 360 Q 80 340 120 360 T 200 380 T 280 390 T 360 370 T 480 340 T 600 300 T 700 280 T 800 270"
        fill="none" stroke="#89b8c8" stroke-width="12" opacity="0.8"/>
  <!-- 鄱阳湖 -->
  <ellipse cx="200" cy="390" rx="25" ry="15" fill="#89b8c8" opacity="0.8"/>
  <!-- 洞庭湖 -->
  <ellipse cx="120" cy="360" rx="20" ry="12" fill="#89b8c8" opacity="0.8"/>

  <!-- 淮河水系 -->
  <path d="M 0 300 Q 100 290 200 295 T 300 300 T 400 310 T 500 320 T 600 325 T 700 330 T 800 335"
        fill="none" stroke="#89b8c8" stroke-width="8" opacity="0.7"/>

  <!-- 主要河流标注（文字很浅） -->
  <text x="650" content-style="italic" fill="#a8c8d8" font-size="16" opacity="0.6">长江</text>
  <text x="650" y="40" fill="#a8c8d8" font-size="16" opacity="0.6">淮河</text>

  <!-- 海岸线（东部） -->
  <path d="M 750 0 Q 780 100 770 200 T 760 300 T 780 400 T 770 500 T 760 600"
        fill="none" stroke="#89b8c8" stroke-width="3" opacity="0.5"/>

  <!-- 区域标注（浅色文字） - 已移到HTML渲染 -->
</svg>
